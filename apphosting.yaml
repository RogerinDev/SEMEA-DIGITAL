# O apphosting.yaml é o arquivo de configuração do Firebase App Hosting.
# O App Hosting usa o Cloud Build para criar e implantar o código-fonte do seu aplicativo.
# Este arquivo é gerado automaticamente e pode ser personalizado.
# Saiba mais em https://firebase.google.com/docs/hosting/app-hosting/apphosting-yaml
build:
  run: npm install --no-cache && npm run build
runConfig:
  # O App Hosting permite que você defina variáveis de ambiente que são lidas do seu aplicativo.
  # Para gerenciar variáveis de forma segura, o App Hosting se integra com o Google Cloud Secret Manager.
  # Saiba mais em https://firebase.google.com/docs/hosting/app-hosting/configure#manage-backend-environment-variables
  secrets: []
# O número de instâncias de CPU alocadas para seu aplicativo.
# Saiba mais em https://firebase.google.com/docs/hosting/app-hosting/configure#cpu
cpu: 1
# A quantidade de memória, em MiB, alocada para seu aplicativo.
# Saiba mais em https://firebase.google.com/docs/hosting/app-hosting/configure#memory
memoryMiB: 512
# O número de solicitações simultâneas que cada instância do seu aplicativo pode manipular.
# Saiba mais em https://firebase.google.com/docs/hosting/app-hosting/configure#concurrency
concurrency: 80
# O número mínimo de instâncias do seu aplicativo que devem estar em execução em todos os momentos.
# Saiba mais em https://firebase.google.com/docs/hosting/app-hosting/configure#min-instances
minInstances: 0
# O número máximo de instâncias do seu aplicativo que podem estar em execução em todos os momentos.
# Saiba mais em https://firebase.google.com/docs/hosting/app-hosting/configure#max-instances
maxInstances: 1
# A localização onde seu aplicativo App Hosting está hospedado.
# Saiba mais em https://firebase.google.com/docs/hosting/app-hosting/locations
location: us-central1
# A política de entrada para o seu aplicativo.
# Saiba mais em https://firebase.google.com/docs/hosting/app-hosting/configure#ingress
ingress: public
