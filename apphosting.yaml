# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# The build section specifies how to build the application.
build:
  # The command to run to build the application.
  # This command is run in the root of the repository.
  # The buildpack will be automatically detected.
  run:
    # Use the latest version of the Next.js buildpack.
    id: 'nextjs'

# The runConfig block specifies runtime configurations for the backend.
runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
  # The environment block defines environment variables available to the app.
  environment:
    # This line creates an environment variable named FIREBASE_SERVICE_ACCOUNT_KEY.
    # Its value is fetched from a secret stored in Secret Manager.
    FIREBASE_SERVICE_ACCOUNT_KEY: ${secret.FIREBASE_SERVICE_ACCOUNT_KEY}

# The serviceAccount field specifies the service account to be used by the
# App Hosting backend.
serviceAccount: semea-digital@appspot.gserviceaccount.com

# The secret block specifies which secrets from Secret Manager should be made
# available to the App Hosting backend.
secret:
  # The ID of the secret stored in Google Cloud Secret Manager.
  # This must match the name of the secret you created.
  - id: FIREBASE_SERVICE_ACCOUNT_KEY